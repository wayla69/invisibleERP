# Ops utility (manual dispatch): remove the db:seed step from the invisibleERP service's custom start
# command on Railway. The 2026-07-03 outage postmortem found the boot chain runs migrate -> seed -> app,
# and seed.ts fail-closes in production BY DESIGN (docs/27 R0-3) - so every boot died after migrations
# were fixed. Prod has live data; the seed step must not run at boot. Prints old/new commands, refuses
# to act if no db:seed segment is found. Uses curl (NOT python urllib - Railway's edge 403s the
# python-urllib User-Agent; see the 04:03 run of the first version). Follow with a deploy.yml dispatch.
name: "Ops - remove db:seed from start command"

on:
  workflow_dispatch:

jobs:
  fix-start:
    runs-on: ubuntu-latest
    environment: production   # RAILWAY_TOKEN is an environment secret (same binding as deploy.yml)
    steps:
      - name: Strip db:seed from invisibleERP start command
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          gq() { curl -sf --max-time 30 -X POST https://backboard.railway.app/graphql/v2 -H "Project-Access-Token: $RAILWAY_TOKEN" -H "Content-Type: application/json" -d "$1"; }
          PT=$(gq '{"query":"query{projectToken{projectId environmentId}}"}')
          PID=$(echo "$PT" | jq -er .data.projectToken.projectId)
          EID=$(echo "$PT" | jq -er .data.projectToken.environmentId)
          SVCS=$(gq "$(jq -nc --arg id "$PID" '{query:"query($id:String!){project(id:$id){services{edges{node{id name}}}}}",variables:{id:$id}}')")
          SID=$(echo "$SVCS" | jq -er '.data.project.services.edges[].node | select(.name=="invisibleERP") | .id')
          INST=$(gq "$(jq -nc --arg s "$SID" --arg e "$EID" '{query:"query($s:String!,$e:String!){serviceInstance(serviceId:$s,environmentId:$e){startCommand}}",variables:{s:$s,e:$e}}')")
          CUR=$(echo "$INST" | jq -r '.data.serviceInstance.startCommand // ""')
          echo "current start command: $CUR"
          case "$CUR" in *db:seed*) ;; *) echo "::error::no db:seed segment found - nothing to change (already fixed?)"; exit 1;; esac
          NEW=$(python3 -c "import sys; print(' && '.join(p.strip() for p in sys.argv[1].split('&&') if 'db:seed' not in p))" "$CUR")
          echo "new start command:     $NEW"
          [ -n "$NEW" ] || { echo "::error::stripped command is empty - refusing"; exit 1; }
          RES=$(gq "$(jq -nc --arg s "$SID" --arg e "$EID" --arg c "$NEW" '{query:"mutation($s:String!,$e:String!,$in:ServiceInstanceUpdateInput!){serviceInstanceUpdate(serviceId:$s,environmentId:$e,input:$in)}",variables:{s:$s,e:$e,in:{startCommand:$c}}}')")
          echo "$RES" | jq -e '.errors' >/dev/null 2>&1 && { echo "::error::mutation failed"; echo "$RES" | jq -c .errors; exit 1; }
          echo "start command updated - dispatch deploy.yml to boot with it"
