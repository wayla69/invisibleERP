name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# The account limit is ~20 concurrent jobs, so superseded runs must not pile up: per-ref group —
# a new push to a PR cancels that PR's older run outright; on main, cancel-in-progress stays false
# so the in-flight run finishes, and GitHub keeps only the newest *pending* run in the group
# (intermediate main pushes are auto-superseded — the tip run covers them). With the harness matrix
# sharded (below), one full run is ~18 jobs and fits a single concurrency wave.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @ierp/shared build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit tests + coverage gate (ratchet thresholds)
        run: pnpm --filter @ierp/api test:coverage
      - name: TypeScript-debt ratchet (as-any + strict-index errors may only go DOWN)
        # docs/27 R2-5 / AUD-ARC-05 — baseline in tools/ci/ts-debt-baseline.json; lower it when you reduce debt.
        run: node tools/ci/check-ts-debt.mjs
      - name: use-client ratchet (client-first web files may only go DOWN)
        # docs/28 §4 / AUD-ARC-09 — baseline in tools/ci/use-client-baseline.json; new pages are server
        # components with client islands (see accounting/eam page.tsx + lib/server-api.ts).
        run: node tools/ci/check-use-client.mjs
      # Hand the compiled output to the harness shards so they don't each rebuild.
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            apps/api/dist
            packages/shared/dist
          retention-days: 1
          if-no-files-found: error

  # The integration harnesses boot the real Nest app over PGlite (a real Postgres),
  # run the Drizzle migrations and assert behaviour — green means "it works", not
  # "it compiles". Previously only a handful ran inline; the rest existed but were
  # never gated, so they could rot silently.
  #
  # SHARDED (2026-07-10): one job per harness meant ~96 jobs per run against the account's
  # ~20-concurrent-job limit — each job also re-paid ~40s of checkout/pnpm/dist setup, and a busy
  # day froze the Actions queue for hours. The matrix now runs DOMAIN SHARDS (~5-11 harnesses per
  # job, balanced by measured runtime, ~4-9 min each), so a whole CI run is ~18 jobs and fits one
  # concurrency wave. Per-harness visibility is preserved: each harness runs in its own collapsible
  # log group, a failure doesn't stop the rest of the shard, and every failed harness is listed at
  # the end. Add a NEW harness to its domain shard (or split a shard if it outgrows ~9 minutes).
  #
  # Harnesses reconciled with shipped features so they can be gated:
  #   - GL-05 maker-checker: a manual JE/GAAP-adjustment posts as Draft and only affects balances once
  #     a DIFFERENT user approves it (tenant-isolation/multiledger/bankrec/costcenter/budget post-then-approve).
  #   - SoD preventive guard: the coarse `warehouse` perm self-conflicts (R11); gaps assigns single-duty perms.
  #   - module-qr asserts modules == MODULE_KEYS (diverged from PERMISSIONS once sub-permissions were added).
  #   - parity analytics derives sale dates in business-TZ (UTC+7), the same basis ForecastingService bins by.
  # Still NOT gated (need external services, not self-contained on PGlite): shadow, reconcile, smoke-http.
  harnesses:
    needs: build
    runs-on: ubuntu-latest
    name: harnesses (${{ matrix.shard }})
    env:
      NODE_OPTIONS: --experimental-sqlite
      JWT_SECRET: ci-harness-secret
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── read/write parity (services vs expected, on PGlite) + tax / Thai compliance ──
          - shard: parity-tax
            run: >-
              parity:writeflow parity:analytics parity:golden
              cutover:taxdocs cutover:etax cutover:etax-email cutover:promptpay
          # ── end-to-end / platform foundations ──
          - shard: platform-a
            run: >-
              cutover:e2e cutover:ext cutover:tenant-isolation cutover:tenant-idx
              cutover:module-qr cutover:gaps
          - shard: platform-b
            run: >-
              cutover:worldclass cutover:migration-parity cutover:ai-eval
              cutover:onboarding cutover:opening-balances
          # ── COSO/ICFR controls (GL-05 maker-checker, SoD block, access review, audit-log immutability) ──
          - shard: controls
            run: >-
              cutover:compliance cutover:cookie-auth cutover:async-jobs cutover:bi-cache
              cutover:pdf-render cutover:pdpa cutover:saas-metrics cutover:governance
              cutover:control-console cutover:access-recert cutover:sod-register
          # ── POS ──
          - shard: pos
            run: >-
              cutover:pos-p0 cutover:pos-p1 cutover:pos-p2 cutover:pos-wiring
              cutover:pos-discount cutover:pricing cutover:splitbill cutover:cashreport
              cutover:returns
          # ── restaurant ──
          - shard: restaurant
            run: >-
              cutover:restaurant cutover:restaurant-offline cutover:hub-snapshot
              cutover:reservations cutover:tips cutover:waste cutover:scheduling
              cutover:cash-banking cutover:refund-approval cutover:menu cutover:recipe
          # ── finance / accounting ──
          - shard: finance
            run: >-
              cutover:revrec cutover:fxreval cutover:intercompany cutover:consolidation
              cutover:recon-profitability cutover:multiledger cutover:bankrec
              cutover:costcenter cutover:budget
          # ── supply chain / inventory / manufacturing ──
          - shard: scm-mfg
            run: >-
              cutover:stock-ops cutover:match cutover:costing cutover:landed-cost cutover:wms cutover:scm17c cutover:cycle-counts cutover:transfer-orders cutover:std-cost-roll cutover:lot-trace
              cutover:manufacturing cutover:mfg-depth cutover:mrp
          # ── CRM / billing / projects / loyalty ──
          - shard: crm
            run: >-
              cutover:crm cutover:cpq cutover:cpq-gl cutover:sub-billing cutover:projects
              cutover:pipeline cutover:service cutover:loyalty cutover:coalition
              cutover:giftcards cutover:receipts
          # ── planning / analytics / channels ──
          - shard: analytics
            run: >-
              cutover:epm-planning cutover:bi cutover:demand-ml cutover:customers
              cutover:branch cutover:channel cutover:offline-sync cutover:workflow
          # ── AI / HR / portal ──
          - shard: ai-hr
            run: >-
              cutover:ai-actions cutover:rag cutover:hcm cutover:ess cutover:supplier
              cutover:payroll cutover:portal-extra
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Run shard — each harness in its own log group; all run even if one fails
        run: |
          failed=""
          for h in ${{ matrix.run }}; do
            pkg="${h%%:*}"; script="${h#*:}"
            echo "::group::${pkg} → ${script}"
            # docs/27 R3-3 — the compliance ToE run writes structured evidence for retention (below).
            ev=""
            if [ "$script" = "compliance" ]; then ev="${GITHUB_WORKSPACE}/compliance-evidence.json"; fi
            if EVIDENCE_OUT="$ev" pnpm --filter "@ierp/${pkg}" "$script"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::harness FAILED: ${pkg} → ${script}"
              failed="$failed ${pkg}:${script}"
            fi
          done
          if [ -n "$failed" ]; then
            echo "Failed harnesses:${failed}"
            exit 1
          fi
      - name: Retain compliance ToE evidence (docs/27 R3-3 — operating-evidence clock)
        if: matrix.shard == 'controls' && always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence-${{ github.sha }}
          path: compliance-evidence.json
          if-no-files-found: warn
          # GitHub caps artifact retention at 90 days by default (400 with an org setting). The quarterly
          # archive job (compliance/soc2-readiness.md §evidence runbook) copies these to durable storage so
          # the ≥15-month ICFR sampling window holds.
          retention-days: 90

  # ITGC vulnerability management: dependency advisories + secret scanning. Evidence for the IT auditor /
  # IPO security review. The dependency audit is a HARD GATE at --audit-level high: any NEW high/critical
  # advisory fails the build. Known, triaged advisories are accepted via auditConfig.ignoreGhsas in
  # pnpm-workspace.yaml and documented in compliance/vulnerability-triage.md (re-reviewed quarterly).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scans full history
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (fails on new high/critical; triaged items in vulnerability-triage.md)
        run: pnpm audit --audit-level high
      - name: License compliance (no GPL/AGPL/SSPL/non-commercial in prod deps; SPDX-aware)
        run: node tools/ci/check-licenses.mjs
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST — CodeQL static analysis for JavaScript/TypeScript.
  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # Web UI smoke (Playwright) — exercises interactions build/unit checks can't, e.g. the ERP/POS
  # workspace switcher (toggle, role-based landing redirect, localStorage persistence, menu filtering).
  # The backend is stubbed in the specs, so no API/DB is needed; the config builds + serves the web app.
  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared (web build dependency)
        run: pnpm --filter @ierp/shared build
      - name: Install Playwright browser
        run: pnpm --filter @ierp/web exec playwright install --with-deps chromium
      - name: Web E2E smoke (ERP/POS workspace switcher)
        run: pnpm --filter @ierp/web test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  migrations-journaled:
    # Guard against unjournaled migrations: drizzle-kit migrate (prod pre-deploy) only applies .sql files
    # listed in meta/_journal.json, so a hand-written .sql not in the journal is silently skipped in prod
    # (the cutover harness runs every .sql directly, so it stays green and the gap is invisible until 500).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every drizzle .sql is registered in _journal.json
        run: |
          node -e '
            const fs = require("fs"), dir = "apps/api/drizzle";
            // docs/27 R5-1: the "orphans" (0085_floor_zone_geometry / 0088_dine_in_order_zone) turned out to be
            // journaled all along (idx 102/103) — the old grandfather list was dead code masking that fact.
            // NO unjournaled grandfathers exist; any new one fails here.
            const GRANDFATHERED = [];
            const sqls = fs.readdirSync(dir).filter(f => f.endsWith(".sql")).map(f => f.slice(0, -4));
            const journal = JSON.parse(fs.readFileSync(dir + "/meta/_journal.json", "utf8")).entries;
            const tags = new Set(journal.map(e => e.tag));
            const unjournaled = sqls.filter(t => !tags.has(t) && GRANDFATHERED.indexOf(t) < 0);
            const orphan = Array.from(tags).filter(t => sqls.indexOf(t) < 0);
            // Two migrations with the SAME 4-digit number (concurrent PRs both adding e.g. 0119_*) collide:
            // prod drizzle-kit migrate ordering is ambiguous and one silently wins. Renumber the newer one.
            // Decision (docs/27 R5-1): the four historical collisions STAY grandfathered — they are already
            // applied in prod and drizzle tracks by full tag, so renumbering applied migrations would be the
            // dangerous move; full filenames sort deterministically. The migration-parity harness proves
            // filename-order == journal-order schema equivalence, so the ambiguity class is now guarded.
            const GRANDFATHERED_DUP = ["0085", "0088", "0104", "0105"];
            const byNum = {};
            for (const t of sqls) { const n = t.slice(0, 4); (byNum[n] = byNum[n] || []).push(t); }
            const dupNum = Object.keys(byNum).filter(n => byNum[n].length > 1 && GRANDFATHERED_DUP.indexOf(n) < 0).map(n => byNum[n].join(" vs "));
            // Duplicate journal tag/idx → a botched merge resolution of meta/_journal.json.
            const seenTag = {}, dupTag = [], seenIdx = {}, dupIdx = [];
            for (const e of journal) { if (seenTag[e.tag]) dupTag.push(e.tag); seenTag[e.tag] = 1; if (seenIdx[e.idx]) dupIdx.push(e.idx); seenIdx[e.idx] = 1; }
            // Non-monotonic `when` → prod drizzle-kit migrate SILENTLY SKIPS the entry forever: it only
            // applies entries whose when is STRICTLY GREATER than the last applied timestamp, so an entry
            // whose when is <= an earlier entry never qualifies once prod has migrated past the earlier one.
            // Root cause of the 2026-07-03 deploy outage: 0145/0146 (when <= 0144) never applied in prod,
            // and 0218 exploded on the missing tip_distribution_lines. They stay grandfathered — their
            // objects are re-created idempotently inside 0218 (renumbering applied journal entries is the
            // dangerous move); any NEW non-monotonic entry fails here. Fix by bumping the when of the new
            // entry above the current maximum. (NB: this script is single-quoted bash — no apostrophes.)
            const GRANDFATHERED_NONMONO = ["0145_table_reservations", "0146_tip_distribution"];
            let maxWhen = 0; const nonMono = [];
            for (const e of journal) {
              if (e.when <= maxWhen && GRANDFATHERED_NONMONO.indexOf(e.tag) < 0) nonMono.push(e.tag + " (when=" + e.when + " <= prior max " + maxWhen + ")");
              if (e.when > maxWhen) maxWhen = e.when;
            }
            if (unjournaled.length) console.error("Unjournaled .sql (prod drizzle-kit migrate SKIPS these): " + unjournaled.join(", "));
            if (orphan.length) console.error("Journal tags with no .sql file: " + orphan.join(", "));
            if (dupNum.length) console.error("Duplicate migration numbers (renumber the newer one to the next free id): " + dupNum.join("; "));
            if (dupTag.length) console.error("Duplicate journal tags: " + dupTag.join(", "));
            if (dupIdx.length) console.error("Duplicate journal idx: " + dupIdx.join(", "));
            if (nonMono.length) console.error("Non-monotonic journal when (prod drizzle-kit migrate SILENTLY SKIPS these — bump when above the current max): " + nonMono.join("; "));
            if (unjournaled.length || orphan.length || dupNum.length || dupTag.length || dupIdx.length || nonMono.length) { console.error("::error::drizzle migration journal/numbering problem — hand-write the NEXT FREE 4-digit number and journal it (or run db:generate)"); process.exit(1); }
            console.log("OK: " + sqls.length + " migrations registered (" + GRANDFATHERED.length + " grandfathered), no duplicate numbers/tags/idx, when strictly increasing (" + GRANDFATHERED_NONMONO.length + " grandfathered).");
          '

      - name: RCM census reconciles (docs may not misquote the control population)
        # docs/27 R3-1 / AUD-CMP-01 — tagged counts in compliance/docs markdown must match build_rcm.py.
        run: node tools/ci/check-rcm-census.mjs

      - name: No compliance overclaims (docs may not re-assert what CONTROL_STATUS_HONEST retracts)
        # 3.6 — fail if a bare "audit-ready"/"NASDAQ-ready"/"SOC 2 certified"/… reappears without an honest
        # qualifier (a negation, the ≥1-quarter-evidence definition, or a dated target). Keeps IPO messaging
        # consistent with the retracted overclaim baseline.
        run: node tools/ci/check-overclaims.mjs

  # Real-Postgres smoke (panel #1) — the divergence class PGlite hides: FORCE-RLS under app_user,
  # the 0193 org-scoped policy, and postgres-js Date round-trips. Report-only for now (continue-on-error)
  # until proven stable on main, then promote to a required check.
  pg-smoke:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ierp_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ierp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Real-Postgres smoke (RLS org-scoping + Date round-trip)
        run: pnpm --filter @ierp/cutover pg-smoke

  # Real-Postgres CORE gate (operational maturity — Step 3). Boots the actual Nest app over a real
  # postgres:16 and drives auth + RLS isolation + the job round-trip + audit immutability + ops-metrics —
  # the FORCE-RLS / postgres-js / trigger behaviours PGlite can't reproduce. A required gate (the
  # "green-on-PGlite / broken-on-prod" class is the recurring root cause this closes).
  pg-core:
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-sqlite
      HARNESS_PG_URL: postgres://postgres:postgres@localhost:5432/ierp_core
      JWT_SECRET: pgcore-ci-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ierp_core
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Real-Postgres core (auth + RLS + jobs + audit immutability)
        run: pnpm --filter @ierp/cutover pg-core
