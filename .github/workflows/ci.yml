name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @ierp/shared build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit tests (vitest + coverage)
        run: pnpm --filter @ierp/api test
      # Hand the compiled output to the harness matrix so 50+ jobs don't each rebuild.
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            apps/api/dist
            packages/shared/dist
          retention-days: 1
          if-no-files-found: error

  # The integration harnesses boot the real Nest app over PGlite (a real Postgres),
  # run the Drizzle migrations and assert behaviour — green means "it works", not
  # "it compiles". Previously only a handful ran inline; the rest existed but were
  # never gated, so they could rot silently. This matrix runs each one as its own
  # required check, in parallel, with per-harness visibility.
  #
  # Harnesses reconciled with shipped features so they can be gated:
  #   - GL-05 maker-checker: a manual JE/GAAP-adjustment posts as Draft and only affects balances once
  #     a DIFFERENT user approves it (tenant-isolation/multiledger/bankrec/costcenter/budget post-then-approve).
  #   - SoD preventive guard: the coarse `warehouse` perm self-conflicts (R11); gaps assigns single-duty perms.
  #   - module-qr asserts modules == MODULE_KEYS (diverged from PERMISSIONS once sub-permissions were added).
  #   - parity analytics derives sale dates in business-TZ (UTC+7), the same basis ForecastingService bins by.
  # Still NOT gated (need external services, not self-contained on PGlite): shadow, reconcile, smoke-http.
  harnesses:
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-sqlite
      JWT_SECRET: ci-harness-secret
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── read/write parity (services vs expected, on PGlite) ──
          - { pkg: parity, script: writeflow }
          - { pkg: parity, script: analytics }
          # ── end-to-end / platform foundations ──
          - { pkg: cutover, script: e2e }
          - { pkg: cutover, script: ext }
          - { pkg: cutover, script: worldclass }
          - { pkg: cutover, script: tenant-isolation }
          - { pkg: cutover, script: module-qr }
          - { pkg: cutover, script: gaps }
          - { pkg: cutover, script: onboarding }
          - { pkg: cutover, script: opening-balances }
          # ── COSO/ICFR controls (GL-05 maker-checker, SoD block, access review, audit-log immutability) ──
          - { pkg: cutover, script: compliance }
          # ── POS ──
          - { pkg: cutover, script: pos-p0 }
          - { pkg: cutover, script: pos-p1 }
          - { pkg: cutover, script: pos-p2 }
          - { pkg: cutover, script: pos-wiring }
          - { pkg: cutover, script: pos-discount }
          - { pkg: cutover, script: pricing }
          - { pkg: cutover, script: splitbill }
          - { pkg: cutover, script: cashreport }
          - { pkg: cutover, script: returns }
          # ── restaurant ──
          - { pkg: cutover, script: restaurant }
          - { pkg: cutover, script: menu }
          - { pkg: cutover, script: recipe }
          # ── tax / Thai compliance ──
          - { pkg: cutover, script: taxdocs }
          - { pkg: cutover, script: etax }
          - { pkg: cutover, script: etax-email }
          - { pkg: cutover, script: promptpay }
          # ── finance / accounting ──
          - { pkg: cutover, script: revrec }
          - { pkg: cutover, script: fxreval }
          - { pkg: cutover, script: intercompany }
          - { pkg: cutover, script: consolidation }
          - { pkg: cutover, script: recon-profitability }
          - { pkg: cutover, script: multiledger }
          - { pkg: cutover, script: bankrec }
          - { pkg: cutover, script: costcenter }
          - { pkg: cutover, script: budget }
          # ── supply chain / inventory / manufacturing ──
          - { pkg: cutover, script: stock-ops }
          - { pkg: cutover, script: match }
          - { pkg: cutover, script: costing }
          - { pkg: cutover, script: wms }
          - { pkg: cutover, script: scm17c }
          - { pkg: cutover, script: manufacturing }
          - { pkg: cutover, script: mfg-depth }
          - { pkg: cutover, script: mrp }
          # ── CRM / billing / projects / loyalty ──
          - { pkg: cutover, script: crm }
          - { pkg: cutover, script: cpq }
          - { pkg: cutover, script: cpq-gl }
          - { pkg: cutover, script: sub-billing }
          - { pkg: cutover, script: projects }
          - { pkg: cutover, script: pipeline }
          - { pkg: cutover, script: service }
          - { pkg: cutover, script: loyalty }
          - { pkg: cutover, script: giftcards }
          - { pkg: cutover, script: receipts }
          # ── planning / analytics / channels / HR ──
          - { pkg: cutover, script: epm-planning }
          - { pkg: cutover, script: bi }
          - { pkg: cutover, script: branch }
          - { pkg: cutover, script: channel }
          - { pkg: cutover, script: offline-sync }
          - { pkg: cutover, script: workflow }
          - { pkg: cutover, script: ai-actions }
          - { pkg: cutover, script: rag }
          - { pkg: cutover, script: hcm }
          - { pkg: cutover, script: payroll }
          - { pkg: cutover, script: portal-extra }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore dist
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: ${{ matrix.pkg }} → ${{ matrix.script }}
        run: pnpm --filter @ierp/${{ matrix.pkg }} ${{ matrix.script }}

  # ITGC vulnerability management: dependency advisories + secret scanning. Evidence for the IT auditor /
  # IPO security review. The dependency audit is a HARD GATE at --audit-level high: any NEW high/critical
  # advisory fails the build. Known, triaged advisories are accepted via auditConfig.ignoreGhsas in
  # pnpm-workspace.yaml and documented in compliance/vulnerability-triage.md (re-reviewed quarterly).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scans full history
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (fails on new high/critical; triaged items in vulnerability-triage.md)
        run: pnpm audit --audit-level high
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST — CodeQL static analysis for JavaScript/TypeScript.
  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # Web UI smoke (Playwright) — exercises interactions build/unit checks can't, e.g. the ERP/POS
  # workspace switcher (toggle, role-based landing redirect, localStorage persistence, menu filtering).
  # The backend is stubbed in the specs, so no API/DB is needed; the config builds + serves the web app.
  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (pnpm@11.8.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared (web build dependency)
        run: pnpm --filter @ierp/shared build
      - name: Install Playwright browser
        run: pnpm --filter @ierp/web exec playwright install --with-deps chromium
      - name: Web E2E smoke (ERP/POS workspace switcher)
        run: pnpm --filter @ierp/web test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
