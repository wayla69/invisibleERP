# Ops utility (manual dispatch): Railway failed-deployment diagnostics for the invisibleERP service.
# The CLI's `railway logs` only returns the ACTIVE deployment's logs — a deployment that dies at boot
# never becomes active, so its crash line is invisible from CI. This job hits Railway's GraphQL API
# (unreachable from dev sandboxes) to: list recent deployments with status, dump the newest FAILED/
# CRASHED deployment's runtime+build logs by ID, and print the service's variable NAMES (never values)
# to verify required prod env (env.validation.ts) actually landed on the service.
name: Ops — Railway failed-deploy diagnostics

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Railway service to inspect'
        default: 'invisibleERP'
        required: false

jobs:
  diag:
    runs-on: ubuntu-latest
    environment: production   # RAILWAY_TOKEN is an environment secret (same binding as deploy.yml)
    steps:
      - name: Dump failed deployment logs + variable names (invisibleERP)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          gq() { curl -s --max-time 30 -X POST https://backboard.railway.app/graphql/v2 -H "Project-Access-Token: $RAILWAY_TOKEN" -H "Content-Type: application/json" -d "$1"; }
          PT=$(gq '{"query":"query{projectToken{projectId environmentId}}"}')
          PID=$(echo "$PT" | jq -r '.data.projectToken.projectId // empty')
          EID=$(echo "$PT" | jq -r '.data.projectToken.environmentId // empty')
          if [ -z "$PID" ]; then echo "::error::token introspection failed"; echo "$PT" | jq -c '.errors // .' ; exit 1; fi
          echo "project=$PID environment=$EID"
          SVCS=$(gq "{\"query\":\"query{project(id:\\\"$PID\\\"){services{edges{node{id name}}}}}\"}")
          echo "services:"; echo "$SVCS" | jq -r '.data.project.services.edges[].node | "  "+.name+"  "+.id'
          SVC_NAME="${{ inputs.service || 'invisibleERP' }}"
          SID=$(echo "$SVCS" | jq -r --arg n "$SVC_NAME" '.data.project.services.edges[].node | select(.name==$n) | .id')
          if [ -z "$SID" ]; then echo "::error::service $SVC_NAME not found in project"; exit 1; fi
          echo "::group::variable NAMES on $SVC_NAME (values never printed)"
          gq "{\"query\":\"query{variables(projectId:\\\"$PID\\\",environmentId:\\\"$EID\\\",serviceId:\\\"$SID\\\")}\"}" | jq -r '.data.variables | keys[]' | sort
          echo "::endgroup::"
          # Whitelisted NON-SECRET values only (private-network coordinates — meaningless outside the
          # project's own Railway network; never print anything else, this repo's action logs are public).
          echo "private-network coordinates:"
          gq "{\"query\":\"query{variables(projectId:\\\"$PID\\\",environmentId:\\\"$EID\\\",serviceId:\\\"$SID\\\")}\"}" | jq -r '.data.variables | {RAILWAY_PRIVATE_DOMAIN, PORT} | to_entries[] | "  "+.key+" = "+(.value // "(unset)")'
          DEPS=$(gq "{\"query\":\"query{deployments(first:8,input:{projectId:\\\"$PID\\\",environmentId:\\\"$EID\\\",serviceId:\\\"$SID\\\"}){edges{node{id status createdAt}}}}\"}")
          echo "recent deployments:"; echo "$DEPS" | jq -r '.data.deployments.edges[].node | "  "+.createdAt+"  "+.status+"  "+.id'
          LATEST=$(echo "$DEPS" | jq -r '.data.deployments.edges[0].node.id // empty')
          if [ -n "$LATEST" ]; then
            echo "::group::runtime log tail of LATEST deployment $LATEST (any status)"
            gq "{\"query\":\"query{deploymentLogs(deploymentId:\\\"$LATEST\\\",limit:60){timestamp severity message}}\"}" | jq -r '.data.deploymentLogs[]? | .timestamp+" ["+(.severity // "-")+"] "+.message'
            echo "::endgroup::"
          fi
          DID=$(echo "$DEPS" | jq -r '[.data.deployments.edges[].node | select(.status=="FAILED" or .status=="CRASHED")][0].id // empty')
          if [ -z "$DID" ]; then echo "no FAILED/CRASHED deployment in the last 8 — nothing to dump"; exit 0; fi
          echo "::group::runtime logs of failed deployment $DID"
          gq "{\"query\":\"query{deploymentLogs(deploymentId:\\\"$DID\\\",limit:150){timestamp severity message}}\"}" | jq -r '.data.deploymentLogs[]? | .timestamp+" ["+(.severity // "-")+"] "+.message'
          echo "::endgroup::"
          echo "::group::build logs of failed deployment $DID (tail)"
          gq "{\"query\":\"query{buildLogs(deploymentId:\\\"$DID\\\",limit:400){timestamp message}}\"}" | jq -r '.data.buildLogs[]? | .timestamp+" "+.message' | tail -50
          echo "::endgroup::"
