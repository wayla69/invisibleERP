# Ops utility (manual dispatch): prove the docs/54 SCM forecast-engine end-to-end IN PRODUCTION.
#
# Runs the EXACT signed round-trip that ScmEngineClientService makes — from INSIDE the invisibleERP
# API container over `railway ssh`, so it uses the container's own SCM_ENGINE_URL
# (http://forecast-engine.railway.internal:8000) + SCM_ENGINE_SECRET and traverses the real
# private-network hop, the same path a live scm-run takes. No DB, no tenant data, no prod mutations —
# pure engine compute (tools/ops/scm-engine-e2e-probe.mjs):
#
#   GET  /readyz       — unauth; the CBC/PuLP solver self-test + Prophet import must both be "ok"
#   POST /v1/forecast  — HMAC-signed; a clean ~90-day series → a Prophet probabilistic forecast
#   POST /v1/optimize  — HMAC-signed; a perishable order plan solved as MILP (shelf-life/MOQ/pack bind)
#
# Why in CI: dev sandboxes cannot reach Railway, and the engine has NO public domain (private-network
# only) — the only place that can reach forecast-engine.railway.internal is another service in the
# project's Railway network, i.e. the API container. Same RAILWAY_TOKEN binding as deploy.yml.
# The probe is delivered as base64 over ssh, so it does not depend on the deployed image already
# carrying the file. Idempotent, read-only against the engine.
name: Ops — SCM engine end-to-end probe (docs/54)

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'API service to run the in-container probe from (must be wired to the engine)'
        default: 'invisibleERP'
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: production   # RAILWAY_TOKEN is an environment secret (same binding as deploy.yml)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Signed forecast + optimize round-trip from inside the API container
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SVC: ${{ inputs.service || 'invisibleERP' }}
        run: |
          set -uo pipefail
          set +e   # the default GitHub shell is `bash -e`; we handle exit codes explicitly so every fallback runs
          [ -n "${RAILWAY_TOKEN:-}" ] || { echo "::error::RAILWAY_TOKEN not configured on the production environment"; exit 1; }
          rw() { npx -y @railway/cli "$@"; }
          gq() { curl -s --max-time 30 -X POST https://backboard.railway.app/graphql/v2 -H "Project-Access-Token: $RAILWAY_TOKEN" -H "Content-Type: application/json" -d "$1"; }

          echo "railway CLI: $(rw --version 2>/dev/null)"

          B64=$(base64 -w0 tools/ops/scm-engine-e2e-probe.mjs)
          REMOTE="echo __SSH_CONNECTED__; echo $B64 | base64 -d | node -"
          CONFIRMED=0
          OUT=""

          # ── Attempt 1: in-container over `railway ssh` (keeps the engine private, exercises the real
          #    private-network hop). `railway ssh --service X sh -c '<probe>'` runs the probe with the
          #    container's own SCM_ENGINE_URL/SECRET. A leading sentinel proves the ssh transport worked. ──
          echo "::group::attempt 1 — railway ssh (in-container, private network)"
          for form in "sh -c" "-- sh -c"; do
            echo "── railway ssh --service $SVC $form <probe> ──"
            OUT=$(rw ssh --service "$SVC" $form "$REMOTE" 2>&1); rc=$?
            echo "$OUT"; echo "(railway ssh exit $rc)"
            if printf '%s' "$OUT" | grep -q "__SSH_CONNECTED__"; then
              printf '%s' "$OUT" | grep -q "E2E: OK" && CONFIRMED=1
              break
            fi
          done
          echo "::endgroup::"

          # ── Attempt 2 (fallback): if ssh cannot exec in CI with a project token, run the SAME signed
          #    probe from the runner against a TEMPORARY public domain on the engine, then delete it.
          #    Business routes still require HMAC (only /healthz + /readyz are open), and it is torn down
          #    immediately, so the brief exposure is safe. This is deterministic and needs no ssh auth. ──
          DOMAIN=""; DOMAIN_ID=""
          if [ "$CONFIRMED" != 1 ]; then
            echo "::group::attempt 2 — temporary public domain + signed round-trip from CI"
            SECRET=$(rw variables --service forecast-engine --kv 2>/dev/null | grep '^SCM_ENGINE_SECRET=' | cut -d= -f2- | tr -d '\r')
            if [ -z "$SECRET" ]; then
              echo "::warning::could not read SCM_ENGINE_SECRET from forecast-engine"
            else
              echo "::add-mask::$SECRET"
              PT=$(gq '{"query":"query{projectToken{projectId environmentId}}"}')
              PID=$(echo "$PT" | jq -r '.data.projectToken.projectId // empty')
              EID=$(echo "$PT" | jq -r '.data.projectToken.environmentId // empty')
              SID=$(gq "{\"query\":\"query{project(id:\\\"$PID\\\"){services{edges{node{id name}}}}}\"}" | jq -r '.data.project.services.edges[].node | select(.name=="forecast-engine") | .id')
              echo "engine service=$SID env=$EID"
              CREATE=$(gq "{\"query\":\"mutation{serviceDomainCreate(input:{environmentId:\\\"$EID\\\",serviceId:\\\"$SID\\\",targetPort:8000}){id domain}}\"}")
              DOMAIN=$(echo "$CREATE" | jq -r '.data.serviceDomainCreate.domain // empty')
              DOMAIN_ID=$(echo "$CREATE" | jq -r '.data.serviceDomainCreate.id // empty')
              if [ -z "$DOMAIN" ]; then
                echo "::warning::serviceDomainCreate returned no domain: $(echo "$CREATE" | jq -c '.errors // .' 2>/dev/null)"
              else
                echo "temporary domain https://$DOMAIN (id $DOMAIN_ID) — waiting for TLS + /healthz…"
                for i in $(seq 1 40); do
                  code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://$DOMAIN/healthz" || echo 000)
                  [ "$code" = "200" ] && { echo "/healthz 200 (after ~$((i*6))s)"; break; }
                  sleep 6
                done
                OUT=$(ENGINE_URL="https://$DOMAIN" ENGINE_SECRET="$SECRET" node tools/ops/scm-engine-e2e-probe.mjs 2>&1); rc=$?
                echo "$OUT"; echo "(probe exit $rc)"
                printf '%s' "$OUT" | grep -q "E2E: OK" && CONFIRMED=1
              fi
            fi
            echo "::endgroup::"
          fi

          # ── Teardown: always remove the temporary public domain (set +e keeps us here even on failure). ──
          if [ -n "$DOMAIN_ID" ]; then
            echo "removing temporary domain $DOMAIN_ID"
            gq "{\"query\":\"mutation{serviceDomainDelete(id:\\\"$DOMAIN_ID\\\")}\"}" | jq -c '.data // .errors // .' 2>/dev/null || true
          fi

          if [ "$CONFIRMED" = 1 ]; then
            echo "✅ END-TO-END CONFIRMED — the engine served a signed Prophet forecast + MILP optimize with the production HMAC secret."
            exit 0
          fi
          echo "::error::engine end-to-end probe did not confirm (no 'E2E: OK' marker) — see the attempts above."
          exit 1
