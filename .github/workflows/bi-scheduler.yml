# Scheduled BI report/action runner — the external trigger for the report-subscription scheduler. The API
# has NO in-process scheduler (multi-instance safe; see modules/jobs/job-worker.service.ts), so every
# frequency-due subscription (ar_collections_dunning, gl_recurring_journals, gl_prepaid_amortize,
# lease_periodic_run, eam_pm_generate, ap_automatch_rerun, …) only fires when something calls the run
# endpoint. This workflow is that something. It enqueues each DUE subscription to the background worker via
# POST /api/bi/subscriptions/run-all-async (202) — off the request path, with the worker's retry/backoff.
# Nothing runs unless an admin has explicitly created a subscription, so this is inert until opted into.
#
# Configure at the REPOSITORY level (Settings → Secrets and variables → Actions) — NOT the gated
# `production` Environment, or the schedule would wait on required reviewers and never run unattended:
#   vars.PROD_API_URL     — base URL of the deployed API (optional; defaults to the invisibleERP domain)
#   secrets.SWEEP_API_KEY — an app API key (in-app: Settings → API Keys; prefixed `ierp_`) used as a Bearer
#                           token — no password login. The default 'read' scope maps server-side to the
#                           `exec` permission the /api/bi/subscriptions/* endpoints require (guards.ts).
# Without the key the job no-ops (warns, non-blocking).
name: BI scheduler (scheduled)

on:
  schedule:
    - cron: '30 18 * * *'   # 01:30 Asia/Bangkok daily (off-peak; offset from loyalty-maintenance's 02:00)
  workflow_dispatch:         # manual run (Actions → Run workflow)

concurrency:
  group: bi-scheduler
  cancel-in-progress: false

jobs:
  run-due:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Enqueue all due report/action subscriptions (all tenants)
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
          SWEEP_API_KEY: ${{ secrets.SWEEP_API_KEY }}
        run: |
          set -e
          # PROD_API_URL falls back to the invisibleERP public domain when the repo variable is unset, so the
          # cron doesn't depend on a correctly-scoped Actions variable. Override by setting vars.PROD_API_URL.
          PROD_API_URL="${PROD_API_URL:-https://invisibleerp-production.up.railway.app}"
          if [ -z "${SWEEP_API_KEY:-}" ]; then
            echo "::warning::SWEEP_API_KEY not set — skipping BI scheduler (create an app API key in Settings → API Keys)"
            exit 0
          fi
          echo "Health check: $PROD_API_URL/healthz"
          code=000
          for i in $(seq 1 12); do code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_API_URL/healthz" || true); [ "$code" = "200" ] && break; echo "  health=$code ($i)"; sleep 5; done
          [ "$code" = "200" ] || { echo "::error::API health check failed (last=$code)"; exit 1; }
          TOK="$SWEEP_API_KEY"   # app API key (ierp_…) used directly as the Bearer token — no login
          echo "POST /api/bi/subscriptions/run-all-async"
          resp=$(curl -s -w "\n%{http_code}" -X POST "$PROD_API_URL/api/bi/subscriptions/run-all-async" -H "Authorization: Bearer $TOK" -H 'Content-Type: application/json' -d '{}')
          body=$(echo "$resp" | sed '$d'); httpcode=$(echo "$resp" | tail -n1)
          echo "  -> $httpcode"
          echo "$body" | jq '{due, enqueued, mode}' 2>/dev/null || echo "$body"
          { [ "$httpcode" = "200" ] || [ "$httpcode" = "202" ]; } || { echo "::error::BI scheduler run failed ($httpcode)"; exit 1; }
          echo "BI scheduler run complete ✅"
