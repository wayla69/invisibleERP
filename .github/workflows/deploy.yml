# ITGC-CM-03 — segregated, approval-gated production deploy.
# Runs ONLY on a push to main (post-merge) or manual dispatch, and is pinned to the GitHub
# `production` Environment. Configure that Environment with REQUIRED REVIEWERS (a person other than
# the change author) so a deploy cannot proceed without an independent approval — i.e. deployer ≠ author.
#
# Secrets required on the `production` Environment:
#   RAILWAY_TOKEN  — Railway project token used by the CLI to trigger the deploy.
name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # ← gate: required reviewers + protected secrets live here
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the deployed commit's git author (git log -1 %ae) for the SoD check below
      - uses: pnpm/action-setup@v4 # version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # ITGC-CM-03 — deployer ≠ author (automated ToE / detective evidence).
      # The CONTROL OF RECORD is the `production` Environment's required-reviewer approval (a human other
      # than the author must approve before this job runs). This step is the machine-checkable EVIDENCE for
      # it: it compares GITHUB_ACTOR (who triggered the deploy) against the deployed commit's git author and
      # fails on a self-deploy (same identity). REPORT-ONLY by default (continue-on-error) — a hard fail here
      # is deliberately avoided because the actor-vs-author identity comparison has legitimate edge cases
      # (squash-merge committer identities, bot/web-flow authors, a workflow_dispatch re-deploy of an older
      # commit) that could otherwise block a valid prod deploy, while the Environment reviewer gate already
      # enforces SoD. Set the repo/environment variable DEPLOY_SOD_ENFORCE=1 to promote it to a HARD gate
      # once the identity conventions are confirmed stable.
      - name: Deploy SoD check (ITGC-CM-03, deployer ≠ author)
        continue-on-error: ${{ vars.DEPLOY_SOD_ENFORCE != '1' }}
        env:
          DEPLOY_ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: COMMIT_AUTHOR="$(git log -1 --format='%ae')" node tools/ci/check-deploy-sod.mjs
      - run: pnpm install --frozen-lockfile
      # Build + typecheck as a last gate before shipping (CI already ran on the PR).
      - run: pnpm --filter @ierp/shared build && pnpm -r typecheck && pnpm -r build
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN not configured on the production environment — aborting." >&2
            exit 1
          fi
          # On failure, pull the service's runtime logs into THIS job log before exiting — the bare
          # "Deploy failed" line from `railway up` carries no cause (a container that dies at boot, e.g.
          # the API's fail-closed env validation or an OOM, is only visible in Railway's own logs, which
          # CI never showed). Diagnosis aid for the intermittent deploy failures of 2026-07-02/03.
          deploy_service() {
            svc="$1"
            if npx -y @railway/cli up --service "$svc" --ci; then
              echo "✅ $svc deployed"
            else
              # Plain `logs` returned the still-ACTIVE (old) replica's logs on 2026-07-03 — try the
              # deployment/build variants too so the FAILED deployment's crash line is captured, plus
              # `status --json` to identify which deployment/environment the CLI is looking at.
              echo "::group::Railway status for $svc"
              timeout 30 npx -y @railway/cli status --json 2>&1 | head -60 || true
              echo "::endgroup::"
              echo "::group::Railway deployment logs for $svc (failed deploy)"
              timeout 45 npx -y @railway/cli logs --service "$svc" -d 2>&1 | tail -120 || true
              echo "::endgroup::"
              echo "::group::Railway build logs for $svc (failed deploy)"
              timeout 45 npx -y @railway/cli logs --service "$svc" -b 2>&1 | tail -60 || true
              echo "::endgroup::"
              echo "::error::Railway deploy failed for $svc — runtime/boot logs above (common causes: missing prod env per apps/api/src/common/env.validation.ts — DATABASE_URL / JWT_SECRET / APP_ENC_KEY / PSP_WEBHOOK_SECRET; or observability backends unset while REQUIRE_OBSERVABILITY_BACKENDS=1 is enforced (set ALLOW_NO_OBSERVABILITY=1 to opt out); or an OOM/DB race at boot)"
              return 1
            fi
          }
          # forecast-engine (docs/54) is a BEST-EFFORT sidecar: if it is not yet provisioned, or its
          # build fails, the two API services still run their in-process fallback planner (they only call
          # out when SCM_ENGINE_URL+SCM_ENGINE_SECRET are set). So its deploy must never abort the
          # mandatory API rollout — swallow a non-zero and downgrade to a warning. Deployed FIRST so that,
          # once the APIs are wired to it, they come up against a freshly-built engine.
          deploy_service forecast-engine || echo "::warning::forecast-engine deploy failed or service not provisioned — APIs fall back to the in-process planner; investigate separately (ops-provision-forecast-engine.yml / ops-railway-diag.yml)"
          deploy_service invisibleERP
          deploy_service invisiblePOSERP
      - name: Smoke test (production)
        # Post-deploy guard (ITGC-OP-04): assert the app is up, the DB is reachable, and key endpoints
        # return 200 (not 500) — catches a "deployed but broken" state such as a migration that never ran.
        # PROD_API_URL is resolved from the invisibleERP service's public domain (via RAILWAY_TOKEN, the same
        # curl/CLI path as ops-set-cors.yml) when vars.PROD_API_URL is unset, so the liveness+readiness floor
        # ALWAYS runs — no more silent skip. Set secrets.SMOKE_USER / SMOKE_PASS (a low-privilege `pos`
        # account) on the production Environment to add authenticated endpoint coverage on top.
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
          SMOKE_USER: ${{ secrets.SMOKE_USER }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -e
          # Resolve the API base URL: an explicit vars.PROD_API_URL override wins; otherwise read the
          # invisibleERP service's own public domain from Railway (no hard-coded host to drift).
          if [ -z "${PROD_API_URL:-}" ] && [ -n "${RAILWAY_TOKEN:-}" ]; then
            dom=$(npx -y @railway/cli variables --service invisibleERP --kv 2>/dev/null | grep '^RAILWAY_PUBLIC_DOMAIN=' | cut -d= -f2- | tr -d '\r' || true)
            [ -n "$dom" ] && { PROD_API_URL="https://$dom"; echo "Resolved PROD_API_URL from Railway: $PROD_API_URL"; }
          fi
          if [ -z "${PROD_API_URL:-}" ]; then echo "::warning::PROD_API_URL unset and invisibleERP domain could not be resolved — skipping smoke test"; exit 0; fi
          # Liveness — is the process up? Retry across the rollout window.
          echo "Liveness: $PROD_API_URL/healthz"
          code=000
          for i in $(seq 1 24); do code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_API_URL/healthz" || true); [ "$code" = "200" ] && break; echo "  health=$code ($i)"; sleep 5; done
          [ "$code" = "200" ] || { echo "::error::API liveness check failed (last=$code)"; exit 1; }
          # Readiness — is the DB reachable? A 503 here is exactly the migration/schema-broken signal that
          # the 2026-07-03 outage produced but no gate caught.
          echo "Readiness: $PROD_API_URL/readyz"
          rc=000
          for i in $(seq 1 12); do rc=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_API_URL/readyz" || true); [ "$rc" = "200" ] && break; echo "  ready=$rc ($i)"; sleep 5; done
          [ "$rc" = "200" ] || { echo "::error::API readiness check failed (last=$rc) — DB unreachable or schema broken"; exit 1; }
          if [ -z "${SMOKE_USER:-}" ] || [ -z "${SMOKE_PASS:-}" ]; then echo "::warning::SMOKE_USER/SMOKE_PASS not set — authenticated smoke skipped (set them to catch schema/permission breakage on authed routes)"; echo "Liveness+readiness smoke passed ✅"; exit 0; fi
          TOK=$(curl -s -X POST "$PROD_API_URL/api/login" -H 'Content-Type: application/json' -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}" | jq -r '.token // empty')
          [ -n "$TOK" ] || { echo "::error::smoke login failed"; exit 1; }
          fail=""
          for p in "/api/restaurant/tables/status" "/api/restaurant/zones" "/api/restaurant/zones/revenue"; do
            c=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOK" "$PROD_API_URL$p")
            echo "  GET $p -> $c"
            [ "$c" = "200" ] || fail="$fail $p($c)"
          done
          [ -z "$fail" ] || { echo "::error::smoke failed (non-200):$fail — likely a missing migration/column"; exit 1; }
          echo "Smoke test passed ✅"
