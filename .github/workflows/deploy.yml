# ITGC-CM-03 — segregated, approval-gated production deploy.
# Runs ONLY on a push to main (post-merge) or manual dispatch, and is pinned to the GitHub
# `production` Environment. Configure that Environment with REQUIRED REVIEWERS (a person other than
# the change author) so a deploy cannot proceed without an independent approval — i.e. deployer ≠ author.
#
# Secrets required on the `production` Environment:
#   RAILWAY_TOKEN  — Railway project token used by the CLI to trigger the deploy.
name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # ← gate: required reviewers + protected secrets live here
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build + typecheck as a last gate before shipping (CI already ran on the PR).
      - run: pnpm --filter @ierp/shared build && pnpm -r typecheck && pnpm -r build
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN not configured on the production environment — aborting." >&2
            exit 1
          fi
          npx -y @railway/cli up --service invisibleERP
          npx -y @railway/cli up --service invisiblePOSERP
      - name: Smoke test (production)
        # Post-deploy guard: assert the app is up and key endpoints return 200 (not 500) — catches a
        # "deployed but broken" state such as a migration that never ran. Set vars.PROD_API_URL and
        # secrets.SMOKE_USER / SMOKE_PASS (a low-privilege `pos` account) on the production Environment
        # to enable the authenticated checks; without them only a health check runs (warns, non-blocking).
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
          SMOKE_USER: ${{ secrets.SMOKE_USER }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: |
          set -e
          if [ -z "${PROD_API_URL:-}" ]; then echo "::warning::PROD_API_URL not set — skipping smoke test"; exit 0; fi
          echo "Health check: $PROD_API_URL/healthz"
          code=000
          for i in $(seq 1 12); do code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_API_URL/healthz" || true); [ "$code" = "200" ] && break; echo "  health=$code ($i)"; sleep 5; done
          [ "$code" = "200" ] || { echo "::error::API health check failed (last=$code)"; exit 1; }
          if [ -z "${SMOKE_USER:-}" ] || [ -z "${SMOKE_PASS:-}" ]; then echo "::warning::SMOKE_USER/SMOKE_PASS not set — authenticated smoke skipped (set them to catch schema/migration breakage)"; exit 0; fi
          TOK=$(curl -s -X POST "$PROD_API_URL/api/login" -H 'Content-Type: application/json' -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}" | jq -r '.token // empty')
          [ -n "$TOK" ] || { echo "::error::smoke login failed"; exit 1; }
          fail=""
          for p in "/api/restaurant/tables/status" "/api/restaurant/zones" "/api/restaurant/zones/revenue"; do
            c=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOK" "$PROD_API_URL$p")
            echo "  GET $p -> $c"
            [ "$c" = "200" ] || fail="$fail $p($c)"
          done
          [ -z "$fail" ] || { echo "::error::smoke failed (non-200):$fail — likely a missing migration/column"; exit 1; }
          echo "Smoke test passed ✅"
