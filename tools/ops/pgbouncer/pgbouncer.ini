; PgBouncer — connection pooler in front of PostgreSQL (operational maturity Tier 2 — capacity).
; The API opens DB_POOL_MAX connections PER worker PER replica; without a pooler that fans out to
; (replicas × WEB_CONCURRENCY × DB_POOL_MAX) server connections and hits Postgres max_connections fast.
; PgBouncer multiplexes many short app transactions onto a small, fixed server-connection pool.
;
; IMPORTANT — pool_mode = transaction requires the app to NOT use server-side prepared statements
; (they're bound to a server connection that transaction-pooling reassigns). Set DB_SIMPLE=1 on the API
; so postgres-js runs with { prepare:false, fetch_types:false }. The app's per-request GUCs use
; SET LOCAL / set_config(..., true) (transaction-scoped) and are therefore transaction-pooling-safe.

[databases]
; Point the app's DATABASE_URL at PgBouncer (host=<pgbouncer> port=6432 dbname=ierp).
ierp = host=<<PG_HOST>> port=5432 dbname=<<PG_DBNAME>>

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = <<PGBOUNCER_ADMIN_USER>>

pool_mode = transaction
; Server connections held open to Postgres. Keep (replicas × default_pool_size) < Postgres max_connections.
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
; Many app clients fan into the small server pool.
max_client_conn = 2000

server_idle_timeout = 600
server_lifetime = 1800
query_wait_timeout = 30
; Surface pool pressure: alert when avg wait / cl_waiting rises (SHOW POOLS) — pairs with the app's
; pool_saturation log event.
log_pooler_errors = 1
stats_period = 60
